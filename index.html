<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Antigravity | Elevate Your Ideas</title>
    <meta name="description" content="A modern, high-performance landing page for the Antigravity project, featuring cutting-edge design and glassmorphism.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="background-elements">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>
    
    <nav class="glass-nav">
        <div class="logo">Antigravity</div>
        <ul class="nav-links">
            <li><a href="#features">Features</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact" class="btn-primary">Get Started</a></li>
        </ul>
    </nav>

    <main class="hero">
        <div class="hero-content">
            <h1 class="hero-title">Defy <span>Gravity</span></h1>
            <p class="hero-subtitle">Experience the next generation of web design. Fast, beautiful, and completely weightless.</p>
            <div class="cta-group">
                <button class="btn-primary" id="exploreBtn">Explore Now</button>
                <button class="btn-secondary">Learn More</button>
            </div>
        </div>
        <div class="hero-image glass-card">
            <div class="card-content" id="dynamicContent">
                <h3>Welcome to the future</h3>
                <p>Interactive elements that respond to your touch.</p>
                <div class="progress-ring"></div>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
